<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <title>Homework Week 2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="box1">
        <h1>Register</h1>
    </div>

    <form><div class="box2">
        <label for="email"> Email </label><br/>
        <input id="email" name="email" type="email">
        
        <br/><br/>

        <label for="username"> Username </label><br/>
        <input id="username" name="username" type="text">
        
        <br/><br/>
        
        <label for="password"> Password </label><br/>
        <input id="password" name="password" type="password">
        
        <br/><br/>
        
        <label for="confirm"> Confirm Password </label><br/>
        <input id="confirm" name="confirm" type="password">
        
        <br/><br/>
        
        <label for="birthday"> Birthday </label><br/>
        <input id="birthday" name="birthday" type="date">
        
        <br/><br/>

        <label for="color"> Favourite Color </label>
        &nbsp;
        <input id="color" name="color" type="color">
        
        <br/><br/>
        

        <label for="gender"> Gender </label><br/>
        
        <input id="gender_0" name="gender" type="radio" value="Male">
        <label for="gender_0"> Male </label><br/>
        
        <input id="gender_1" name="gender" type="radio" value="Female">
        <label for="gender_1"> Female </label><br/>
        
        <input id="gender_2" name="gender" type="radio" value="Unspecific">
        <label for="gender_2"> Unspecific </label><br/>

        <br/>

        <input id="remember" name="remember" type="checkbox">
        <label for="remember"> Remember Me </label>
        
        <br/><br/>

        <input id="register" name="register" type="button" value="Register">
        <input id="reset" name="reset" type="reset" value="Reset">


    </div></form>

</body>
</html>
